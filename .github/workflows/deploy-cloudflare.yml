name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy
  cancel-in-progress: false

jobs:
  # ─── Deploy the Cloudflare Worker (backend API + WebSocket) ────────────────
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      worker_url: ${{ steps.worker-url.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install Worker dependencies
        working-directory: cloudflare/worker
        run: npm ci

      - name: Deploy Worker
        working-directory: cloudflare/worker
        run: npx wrangler deploy --keep-vars
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Determine Worker URL
        id: worker-url
        # wrangler prints the deployment URL; fall back to the standard pattern
        run: |
          ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          echo "url=https://zwillingstag-api.${ACCOUNT_ID}.workers.dev" >> "$GITHUB_OUTPUT"

  # ─── Build the React frontend and deploy to Cloudflare Pages ───────────────
  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-latest
    needs: deploy-worker
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Compute WebSocket URL
        id: ws-url
        run: |
          WORKER_URL="${{ vars.WORKER_URL || needs.deploy-worker.outputs.worker_url }}"
          WS_URL="${WORKER_URL/https:\/\//wss://}/ws"
          WS_URL="${WS_URL/http:\/\//ws://}"
          echo "url=$WS_URL" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        working-directory: frontend
        env:
          # Point the frontend at the deployed Worker for API and WebSocket traffic.
          # Override WORKER_URL / WORKER_WS_URL in GitHub Actions Variables for a
          # custom domain; otherwise the auto-detected Worker URL is used.
          VITE_API_URL: ${{ vars.WORKER_URL || needs.deploy-worker.outputs.worker_url }}
          VITE_WS_URL: ${{ vars.WORKER_WS_URL || steps.ws-url.outputs.url }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: zwillingstag
          directory: frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
