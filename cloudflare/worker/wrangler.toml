name = "zwillingstag-api"
main = "src/index.ts"
compatibility_date = "2024-09-25"

# ─── Workers KV ───────────────────────────────────────────────────────────────
# Create with: npx wrangler kv:namespace create KV_CACHE
# Then replace the placeholder IDs below.
[[kv_namespaces]]
binding = "KV_CACHE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

# ─── Durable Objects ──────────────────────────────────────────────────────────
[durable_objects]
bindings = [
  { name = "SIMULATOR", class_name = "SimulatorDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["SimulatorDO"]

# ─── Environment variables (non-secret) ──────────────────────────────────────
[vars]
OPENAI_MODEL = "gpt-4o-mini"

# Secrets are set via `wrangler secret put` or via the Cloudflare dashboard:
#   OPENAI_API_KEY      – OpenAI API key for LLM-generated reactions
#   BUNDESTAG_API_KEY   – Bundestag DIP API key (optional; mock data used without it)
